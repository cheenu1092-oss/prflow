name: CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Install SQLite dev
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./... -count=1 -v
